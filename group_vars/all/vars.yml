# group_vars/all/vars.yml

# Single source of truth for where persistent container data lives.
# This is the drive your admin mounts at /mnt/docker (/dev/sdb1) —
# everything under here is what gets backed up, and restoring it to
# a fresh host + `docker compose up` should fully reconstitute state.
docker_data_root: /srv/docker
docker_system_root: /mnt/docker

moodle_admin_user: "{{ vault_moodle_admin_user }}"
moodle_admin_password: "{{ vault_moodle_admin_password }}"
moodle_db_password: "{{ vault_moodle_db_password }}"

odoo_admin_password: "{{ vault_odoo_admin_password }}"
odoo_db_password: "{{ vault_odoo_db_password }}"

n8n_encryption_key: "{{ vault_n8n_encryption_key }}"

ldap_host: "{{ vault_ldap_host }}"
ldap_bind_dn: "{{ vault_ldap_bind_dn }}"
ldap_bind_password: "{{ vault_ldap_bind_password }}"
ldap_search_base: "{{ vault_ldap_search_base }}"

postgres_password: "{{ vault_postgres_postgres_password }}"

ansible_password: "{{ vault_ansible_password }}"

traefik_dashboard_users: "{{ vault_traefik_dashboard_users }}"

# Note: traefik_hostname / moodle_hostname / odoo_hostname / n8n_hostname
# are per-environment values (this dev box vs the eventual prod server +
# DNS), so they live solely in inventory.yml, not here.

# Moodle Database Config
moodle_db_user: obrien
moodle_db_name: obrien

# Note: the Moodle site name (moodle_sitename) is set per-deployment
# in inventory.yml alongside traefik_hostname/moodle_hostname/etc,
# not here.