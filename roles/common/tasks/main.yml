---
- name: Set timezone
  community.general.timezone:
    name: Australia/Melbourne
  tags: always

- name: Force a rough clock sync via web headers (Bypasses APT)
  ansible.builtin.shell: |
    # Fetch the current time from a secure web header and force set the system clock
    CURRENT_TIME=$(curl -sI https://www.google.com | grep -i '^date:' | sed 's/^[Dd]ate: //g' | tr -d '\r')
    if [ ! -z "$CURRENT_TIME" ]; then
      date -s "$CURRENT_TIME"
    fi
  failed_when: false # Don't crash if curl fails, let the next steps try
  tags: always

- name: Enable systemd-timesyncd as a fallback
  ansible.builtin.command: timedatectl set-ntp true
  tags: always

- name: Clean up corrupted apt cache files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/cache/apt/pkgcache.bin
    - /var/cache/apt/srcpkgcache.bin
  tags: always

- name: Force a clean apt cache rebuild
  ansible.builtin.command: apt-get clean
  tags: always

- name: Ensure chrony is installed
  ansible.builtin.apt:
    name: chrony
    state: present
    update_cache: true
  tags: always

- name: Stop chrony service to allow manual step
  ansible.builtin.systemd:
    name: chrony
    state: stopped
  tags: always

- name: Force immediate clock sync against public NTP
  ansible.builtin.command: chronyd -q 'pool au.pool.ntp.org iburst'
  register: ntp_sync
  changed_when: ntp_sync.rc == 0
  tags: always

- name: Ensure chrony is started and enabled
  ansible.builtin.systemd:
    name: chrony
    state: started
    enabled: true
  tags: always

- name: Install prerequisites
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - net-tools
    state: present
    update_cache: true
  tags: always

- name: Add Docker GPG key
  shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
      -o /etc/apt/keyrings/docker.asc
  tags: always

- name: Add Docker repo
  shell: |
    echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] \
    https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
    > /etc/apt/sources.list.d/docker.list
  tags: always

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true
  tags: always

- name: Check whether {{ docker_data_root }} is a mounted filesystem
  ansible.builtin.command: mountpoint -q "{{ docker_data_root }}"
  register: docker_data_root_mount
  changed_when: false
  failed_when: false
  tags: always

- name: Abort if the data drive is not mounted at {{ docker_data_root }}
  ansible.builtin.fail:
    msg: >-
      {{ docker_data_root }} is not currently a mount point. Refusing to
      continue, because container data would silently be written to the
      OS disk instead of the data drive (/dev/sdb1). Mount the data drive
      at {{ docker_data_root }} first, then re-run this playbook.
  when: docker_data_root_mount.rc != 0
  tags: always

- name: Create app config directories (reproducible, live on OS disk)
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ docker_system_root }}/traefik"
    - "{{ docker_system_root }}/moodle"
    - "{{ docker_system_root }}/odoo"
    - "{{ docker_system_root }}/n8n"
  tags: always

- name: Create app data directories (persistent state, live on {{ docker_data_root }})
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ docker_data_root }}/traefik/data"
    - "{{ docker_data_root }}/moodle/db"
    - "{{ docker_data_root }}/moodle/moodledata"
    - "{{ docker_data_root }}/moodle/html"
    - "{{ docker_data_root }}/odoo/db"
    - "{{ docker_data_root }}/odoo/odoo"
    - "{{ docker_data_root }}/odoo/addons"
    - "{{ docker_data_root }}/n8n/data"
  tags: always

- name: Add user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true


- name: Create proxy Docker network
  community.docker.docker_network:
    name: proxy
    state: present
  tags: always

- name: Copy Traefik compose files
  template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: '0644'
  loop:
    - { src: traefik/docker-compose.yml.j2, dest: /opt/traefik/docker-compose.yml }
    - { src: traefik/traefik.yml.j2, dest: /opt/traefik/traefik.yml }
  tags: traefik

- name: Copy Moodle compose files
  template:
    src: moodle/docker-compose.yml.j2
    dest: /opt/moodle/docker-compose.yml
    mode: '0644'
  tags: moodle

- name: Copy Odoo compose files
  template:
    src: odoo/docker-compose.yml.j2
    dest: /opt/odoo/docker-compose.yml
    mode: '0644'
  tags: odoo

- name: Copy n8n compose files
  template:
    src: n8n/docker-compose.yml.j2
    dest: /opt/n8n/docker-compose.yml
    mode: '0644'
  tags: n8n

- name: Bring up Traefik
  community.docker.docker_compose_v2:
    project_src: /opt/traefik
    state: present
  tags: traefik

- name: Ensure Moodle deployment directory exists
  ansible.builtin.file:
    path: /opt/moodle
    state: directory
    mode: '0755'
  tags: moodle

# erseco/alpine-moodle bakes the actual Moodle codebase into /var/www/html
# at image build time. Docker's named volumes auto-populate from the image
# on first use, but bind mounts don't — an empty bind-mounted host dir just
# shadows the code with nothing. This seeds it manually, once, before the
# stack ever starts, so it lands on the backed-up data drive as real files
# instead of relying on a Docker-managed volume.
- name: Check if Moodle codebase is already present in the bind-mounted html dir
  ansible.builtin.stat:
    path: "{{ docker_data_root }}/moodle/html/admin/cli/install.php"
  register: moodle_html_seeded
  tags: moodle

- name: Seed Moodle html directory from the image
  ansible.builtin.shell: |
    sudo docker run --rm --user root \
      -v {{ docker_data_root }}/moodle/html:/mnt/seed \
      --entrypoint /bin/sh \
      erseco/alpine-moodle \
      -c "cp -a /var/www/html/. /mnt/seed/"
  become: no
  when: not moodle_html_seeded.stat.exists
  tags: moodle

- name: Set moodledata/html permissions (erseco/alpine-moodle runs as nobody, uid/gid 65534)
  ansible.builtin.shell: |
    sudo chown -R 65534:65534 {{ docker_data_root }}/moodle/moodledata
    sudo chown -R 65534:65534 {{ docker_data_root }}/moodle/html
    sudo chmod -R 755 {{ docker_data_root }}/moodle/moodledata
    sudo chmod -R 755 {{ docker_data_root }}/moodle/html
  become: no
  tags: moodle

- name: Deploy Moodle Stack via Docker Compose
  community.docker.docker_compose_v2:
    project_src: /opt/moodle
    state: present
  tags: moodle

# H5P core content (mod_h5pactivity) ships in Moodle itself since 3.9 and
# should already be available in "Add an activity" with no extra work.
# Only run this (ansible-playbook site.yml --tags h5p) if you specifically
# want the older community mod_hvp plugin instead — e.g. for h5p.org Hub
# browsing or resumable content state. Moodle's own docs recommend NOT
# running both side by side. The 'never' tag means these are skipped on
# normal runs and only execute when h5p is explicitly requested.
- name: Check if H5P (mod_hvp) plugin is already installed
  ansible.builtin.stat:
    path: "{{ docker_data_root }}/moodle/html/mod/hvp/version.php"
  register: h5p_plugin_installed
  tags: [h5p, never]

- name: Install H5P (mod_hvp) plugin via Moosh
  community.docker.docker_container_exec:
    container: moodle
    command: moosh plugin-install mod_hvp
  register: h5p_install
  failed_when: false
  when: not h5p_plugin_installed.stat.exists
  tags: [h5p, never]

- name: Retry H5P plugin install (known Moosh first-run issue, see erseco/alpine-moodle docs)
  community.docker.docker_container_exec:
    container: moodle
    command: moosh plugin-install --delete mod_hvp
  when:
    - not h5p_plugin_installed.stat.exists
    - h5p_install.rc != 0
  tags: [h5p, never]

- name: Ensure unzip is installed
  apt:
    name: unzip
    state: present
  tags: odoo

- name: Ensure Odoo data directory has correct permissions
  ansible.builtin.shell: |
    sudo chown -R 101:101 {{ docker_data_root }}/odoo
    sudo chmod -R 755 {{ docker_data_root }}/odoo
  become: no # Uses your proven passwordless sudo shell execution
  tags: odoo

- name: Install OCA quality_control_oca module from OCA/manufacture
  ansible.builtin.shell: |
    sudo rm -rf {{ docker_data_root }}/odoo/addons/quality
    sudo rm -rf {{ docker_data_root }}/odoo/addons/quality_control_oca
    wget -q https://github.com/OCA/manufacture/archive/refs/heads/17.0.zip -O /tmp/manufacture.zip
    unzip -q /tmp/manufacture.zip "manufacture-17.0/quality_control_oca/*" -d /tmp/manufacture-extract
    sudo mv /tmp/manufacture-extract/manufacture-17.0/quality_control_oca {{ docker_data_root }}/odoo/addons/
    rm -rf /tmp/manufacture.zip /tmp/manufacture-extract
  args:
    creates: "{{ docker_data_root }}/odoo/addons/quality_control_oca/__manifest__.py"
  become: no
  tags: odoo

- name: Set db permissions
  ansible.builtin.shell: |
    sudo chown -R 999:999 {{ docker_data_root }}/odoo/db
    sudo chmod -R 755 {{ docker_data_root }}/odoo/db
  become: no # Uses your proven passwordless sudo shell execution
  tags: odoo

- name: Bring up Odoo (Raw Sudo Shell)
  ansible.builtin.shell: |
    sudo docker compose up -d
  args:
    chdir: /opt/odoo
  become: no # <--- Crucial: Bypasses the Ansible Python TTY wrapper
  tags: odoo

- name: Set n8n permissions
  ansible.builtin.shell: |
    sudo chown -R 1000:1000 {{ docker_data_root }}/n8n/data
    sudo chmod -R 755 {{ docker_data_root }}/n8n/data
  become: no # Uses your proven passwordless sudo shell execution
  tags: n8n

- name: Bring up n8n
  ansible.builtin.shell: |
    sudo docker compose up -d
  args:
    chdir: /opt/n8n
  become: false
  become_user: "{{ ansible_user }}"
  tags: n8n